<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080808"/>
<link rel="manifest" href="data:application/manifest+json,{
  %22name%22:%22Team%20365%20Check%20In%22,
  %22short_name%22:%22Team%20365%22,
  %22display%22:%22standalone%22,
  %22background_color%22:%22%23080808%22,
  %22theme_color%22:%22%23080808%22,
  %22orientation%22:%22portrait%22,
  %22start_url%22:%22/checkin.html%22,
  %22icons%22:[{%22src%22:%22https://raw.githubusercontent.com/lamontteam365/team365-booking/main/icon-192.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]
}"/>
<title>Team 365 · Check In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=Syncopate:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080808;min-height:100vh;font-family:'DM Sans',sans-serif;color:#fff}

/* Full-width tablet layout — no max-width cap */
.app{
  width:100%;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  background:#080808;
}

/* ── Hero header ── */
.hero{
  background-image:linear-gradient(rgba(8,8,8,0.72),rgba(8,8,8,0.88)),
    url("https://raw.githubusercontent.com/lamontteam365/team365-booking/main/images/671a9a90865c3673c895b473f6d1feed.jpg");
  background-size:cover;
  background-position:center top;
  padding:36px 28px 28px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  border-bottom:1px solid #1a1a1a;
}
.hero-circle{
  width:88px;height:88px;border-radius:50%;
  border:2px solid #333;background:#111;
  overflow:hidden;margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;
}
.hero-circle img{width:100%;height:100%;object-fit:cover;}
.hero-name{font-family:'Syncopate',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.18em;color:#fff;margin-bottom:5px}
.hero-tag{font-family:'Syncopate',sans-serif;font-size:6px;font-weight:700;letter-spacing:0.2em;color:#555;margin-bottom:14px}
.hero-badge{font-size:9px;letter-spacing:0.18em;color:#1d9bf0;background:#0a1a2a;border:1px solid #1d3a5a;border-radius:3px;padding:4px 14px}

/* ── Day nav ── */
.day-nav{display:flex;align-items:center;padding:18px 24px 0}
.day-arrow{background:none;border:none;color:#888;cursor:pointer;font-size:32px;padding:4px 16px;line-height:1;transition:color .15s}
.day-arrow:not(:disabled):hover{color:#fff}
.day-label{flex:1;text-align:center}
.day-label-main{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.06em;color:#fff;line-height:1}
.day-label-sub{font-size:9px;letter-spacing:0.2em;color:#555;font-weight:600;margin-top:3px}
.today-btn{font-size:9px;letter-spacing:0.12em;color:#1d9bf0;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;padding:4px 8px}

/* ── Classes list ── */
.cls-wrap{
  flex:1;
  padding:18px 24px;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
}
.no-classes{text-align:center;padding:64px 0;font-size:12px;letter-spacing:0.16em;color:#444;line-height:2.4}

/* ── Class card ── */
.c-row{
  display:flex;align-items:center;gap:16px;
  padding:14px 20px;
  background:#141414;border:1px solid #666;border-radius:9px;
  transition:border-color .15s;cursor:pointer;
}
.c-row:hover{border-color:#999}
.c-row.expanded{border-color:#1d9bf0;border-bottom-left-radius:0;border-bottom-right-radius:0}
.c-time{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.03em;color:#fff;min-width:96px;line-height:1}
.c-class-name{font-size:8px;letter-spacing:0.12em;color:#555;font-weight:600;margin-top:4px;font-family:'DM Sans',sans-serif}
.c-mid{flex:1;display:flex;flex-direction:column;gap:7px}
.c-bars{display:flex;gap:3px}
.c-bar{flex:1;height:3px;border-radius:2px;background:#2a2a2a}
.c-bar.ct{background:#fff}
.c-sub{font-size:11px;letter-spacing:0.1em;color:#999;font-weight:500}
.c-chevron{font-size:14px;color:#555;flex-shrink:0;transition:transform .2s}
.c-row.expanded .c-chevron{transform:rotate(180deg)}

/* ── Expanded member list ── */
.members-panel{
  background:#141414;
  border:1px solid #1d9bf0;border-top:none;
  border-bottom-left-radius:9px;border-bottom-right-radius:9px;
  overflow:hidden;margin-top:-1px;
}
.members-panel-empty{text-align:center;padding:22px;font-size:11px;letter-spacing:0.14em;color:#333;font-weight:500}
.member-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  border-bottom:1px solid #0f0f0f;
}
.member-row:last-child{border-bottom:none}
.member-row.checked{background:#0a1a0e}
.member-info{display:flex;flex-direction:column;gap:3px}
.member-name{font-size:16px;color:#fff;font-weight:500;letter-spacing:0.02em}
.member-checkin-time{font-size:10px;color:#4aaa66;letter-spacing:0.08em;margin-top:1px}
.checkin-btn{
  font-size:10px;letter-spacing:0.1em;font-weight:600;
  font-family:'DM Sans',sans-serif;border:none;border-radius:5px;
  padding:10px 20px;cursor:pointer;transition:all .15s;
}
.checkin-btn.do{background:#1d9bf0;color:#fff}
.checkin-btn.do:hover{background:#1a8ad6}
.checkin-btn.undo{background:#1a1a1a;color:#666;border:1px solid #2a2a2a}
.checkin-btn.undo:hover{color:#e06040;border-color:#e06040}
.checkin-tick{color:#4aaa66;font-size:18px;margin-right:8px;flex-shrink:0}

/* ── Footer ── */
.kiosk-footer{padding:18px 28px;border-top:1px solid #111;text-align:center}
.footer-tagline{font-family:'Syncopate',sans-serif;font-size:7px;letter-spacing:0.18em;color:#fff;font-weight:700;margin-bottom:7px}
.footer-powered{font-size:8px;letter-spacing:0.06em;color:#555;margin-bottom:10px}
.footer-powered a{color:#1d9bf0;text-decoration:none}
.refresh-row{display:flex;align-items:center;justify-content:center;gap:10px}
.refresh-lbl{font-size:9px;letter-spacing:0.14em;color:#2a2a2a;font-weight:500}
.refresh-btn{font-size:9px;letter-spacing:0.1em;color:#1d9bf0;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600}

/* ── Toast ── */
.toast{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  background:#fff;color:#000;
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;
  padding:12px 28px;border-radius:4px;
  pointer-events:none;transition:opacity .3s;z-index:200;
  white-space:nowrap;opacity:0;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useCallback } = React;
const SB_URL = "https://xczwmexavysvljmobbgv.supabase.co";
const SB_KEY = "sb_publishable_tujGGhPRUimflq1-IFzuvA_Crw6knMO";
const SB_HDR = {"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":"return=minimal"};
async function sbGet(t,q=""){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:SB_HDR});return r.ok?await r.json():[];}catch{return[];}}
async function sbPatch(t,q,d){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{method:"PATCH",headers:SB_HDR,body:JSON.stringify(d)});return r.ok;}catch{return false;}}
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WD_TIMES=["05:15","06:15","07:15","09:15","12:00","17:15","18:15","19:15"];
const SAT_TIMES=["06:30","07:30","08:30","09:30"];
const MAX_SPOTS=16;
const DEFAULT_DOW_NAMES={1:"RISE UP",2:"STRENGTH LOWER",3:"ASCEND",4:"STRENGTH UPPER",5:"ELEVATE",6:"SUMMIT"};
function toDS(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fmt12(t){if(!t)return"";const[h,m]=t.split(":").map(Number);const ampm=h<12?"AM":"PM";const h12=h===0?12:h>12?h-12:h;return`${h12}:${String(m).padStart(2,"0")} ${ampm}`;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isToday(d){const n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}
function getToday(){const d=new Date();if(d.getDay()===0){d.setDate(d.getDate()+1);}return d;}
function App(){
  const today=getToday();
  const [selDate,setSelDate]=useState(today);
  const [bookings,setBookings]=useState([]);
  const [classLimits,setClassLimits]=useState({});
  const [slotNames,setSlotNames]=useState({});
  const [dowNames,setDowNames]=useState(DEFAULT_DOW_NAMES);
  const [loading,setLoading]=useState(true);
  const [expandedSlot,setExpandedSlot]=useState(null);
  const [busy,setBusy]=useState({});
  const [toast,setToast]=useState({show:false,msg:""});
  const [lastRefresh,setLastRefresh]=useState(new Date());
  useEffect(()=>{
    sbGet("coaching_notes","class_name=eq.__DOW_NAMES__&select=content&limit=1").then(rows=>{
      if(rows&&rows[0]){try{const dn=JSON.parse(rows[0].content);setDowNames(p=>({...p,...dn}));}catch{}}
    });
  },[]);
  const selDK=toDS(selDate);
  const isSat=selDate.getDay()===6;
  const isTodaySel=isToday(selDate);
  const dayOfWeek=selDate.getDay();
  const loadData=useCallback(async()=>{
    setLoading(true);
    const dk=toDS(selDate);
    const [bks,limits]=await Promise.all([
      sbGet("bookings",`date_key=eq.${dk}&select=id,name,email,time,checked_in,checked_in_at&order=time.asc,name.asc`),
      sbGet("class_limits",`date_key=eq.${dk}&select=time_slot,max_spots,name`)
    ]);
    setBookings(bks||[]);
    const cl={};const sn={};
    (limits||[]).forEach(r=>{
      cl[r.time_slot]=r.max_spots;
      if(r.name)sn[r.time_slot]=r.name;
    });
    setClassLimits(cl);
    setSlotNames(sn);
    setLastRefresh(new Date());
    setLoading(false);
  },[selDate]);
  useEffect(()=>{loadData();},[loadData]);
  useEffect(()=>{const id=setInterval(()=>loadData(),180000);return()=>clearInterval(id);},[loadData]);
  const baseTimes=isSat?SAT_TIMES:WD_TIMES;
  const extraTimes=Object.keys(classLimits).filter(t=>!baseTimes.includes(t));
  const allTimes=[...baseTimes,...extraTimes].sort().filter(t=>(classLimits[t]??MAX_SPOTS)>0);
  function getClassName(time){
    return slotNames[time]||dowNames[dayOfWeek]||"";
  }
  async function toggleCheckIn(bk){
    if(busy[bk.id])return;
    setBusy(p=>({...p,[bk.id]:true}));
    const newVal=!bk.checked_in;
    const ok=await sbPatch("bookings",`id=eq.${bk.id}`,{checked_in:newVal,checked_in_at:newVal?Date.now():null});
    if(ok){
      setBookings(prev=>prev.map(b=>b.id===bk.id?{...b,checked_in:newVal,checked_in_at:newVal?Date.now():null}:b));
      showToast(newVal?`${bk.name} checked in ✓`:`${bk.name} undone`);
    }else{showToast("Error — try again");}
    setBusy(p=>({...p,[bk.id]:false}));
  }
  function showToast(msg){setToast({show:true,msg});setTimeout(()=>setToast({show:false,msg:""}),2200);}
  function changeDay(delta){
    let next=addDays(selDate,delta);
    if(next.getDay()===0)next=addDays(next,delta>0?1:-1);
    setSelDate(next);setExpandedSlot(null);
  }
  const DAY_NAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const refreshStr=`${lastRefresh.getHours()}:${String(lastRefresh.getMinutes()).padStart(2,"0")}`;
  return React.createElement("div",{className:"app"},
    React.createElement("div",{className:"hero"},
      React.createElement("div",{className:"hero-circle"},
        React.createElement("img",{
          src:"https://raw.githubusercontent.com/lamontteam365/team365-booking/main/icon-192.png",
          onError:e=>{e.target.style.display="none";},alt:"Team 365"
        })
      ),
      React.createElement("div",{className:"hero-name"},"LAMONT TEAM 365"),
      React.createElement("div",{className:"hero-tag"},"EVERYDAY. ALL YEAR ROUND."),
      React.createElement("div",{className:"hero-badge"},"CHECK IN KIOSK")
    ),
    React.createElement("div",{className:"day-nav"},
      React.createElement("button",{className:"day-arrow",onClick:()=>changeDay(-1)},"‹"),
      React.createElement("div",{className:"day-label"},
        React.createElement("div",{className:"day-label-main"},isTodaySel?"TODAY":DAY_NAMES[selDate.getDay()].toUpperCase()),
        React.createElement("div",{className:"day-label-sub"},`${selDate.getDate()} ${MONTHS[selDate.getMonth()]} ${selDate.getFullYear()}`)
      ),
      React.createElement("button",{className:"day-arrow",onClick:()=>changeDay(1)},"›")
    ),
    !isTodaySel&&React.createElement("div",{style:{textAlign:"center",padding:"4px 0 0"}},
      React.createElement("button",{className:"today-btn",onClick:()=>{setSelDate(today);setExpandedSlot(null);}},"← BACK TO TODAY")
    ),
    loading
      ?React.createElement("div",{className:"cls-wrap"},React.createElement("div",{className:"no-classes"},"LOADING..."))
      :React.createElement("div",{className:"cls-wrap"},
          allTimes.length===0
            ?React.createElement("div",{className:"no-classes"},"NO CLASSES SCHEDULED")
            :allTimes.map(time=>{
                const list=bookings.filter(b=>b.time===time);
                const taken=list.length;
                const maxSp=classLimits[time]||MAX_SPOTS;
                const checkedCount=list.filter(b=>b.checked_in).length;
                const isExpanded=expandedSlot===time;
                const className=getClassName(time);
                return React.createElement("div",{key:time},
                  React.createElement("div",{
                    className:`c-row${isExpanded?" expanded":""}`,
                    onClick:()=>setExpandedSlot(isExpanded?null:time)
                  },
                    React.createElement("div",{style:{display:"flex",flexDirection:"column",minWidth:96}},
                      React.createElement("div",{className:"c-time"},fmt12(time)),
                      className&&React.createElement("div",{className:"c-class-name"},className)
                    ),
                    React.createElement("div",{className:"c-mid"},
                      React.createElement("div",{className:"c-bars"},
                        Array.from({length:maxSp}).map((_,i)=>React.createElement("div",{key:i,className:`c-bar${i<taken?" ct":""}`}))
                      ),
                      React.createElement("div",{className:"c-sub"},
                        taken===0?"No bookings yet":`${checkedCount} of ${taken} checked in`
                      )
                    ),
                    React.createElement("div",{className:"c-chevron"},"▾")
                  ),
                  isExpanded&&React.createElement("div",{className:"members-panel"},
                    list.length===0
                      ?React.createElement("div",{className:"members-panel-empty"},"NO BOOKINGS FOR THIS CLASS")
                      :list.map(bk=>React.createElement("div",{
                            key:bk.id,
                            className:`member-row${bk.checked_in?" checked":""}`
                          },
                          React.createElement("div",{style:{display:"flex",alignItems:"center"}},
                            bk.checked_in&&React.createElement("span",{className:"checkin-tick"},"✓"),
                            React.createElement("div",{className:"member-info"},
                              React.createElement("div",{className:"member-name"},bk.name),
                              bk.checked_in&&bk.checked_in_at&&React.createElement("div",{className:"member-checkin-time"},
                                `Checked in ${new Date(bk.checked_in_at).getHours()}:${String(new Date(bk.checked_in_at).getMinutes()).padStart(2,"0")}`
                              )
                            )
                          ),
                          React.createElement("button",{
                            className:`checkin-btn ${bk.checked_in?"undo":"do"}`,
                            onClick:()=>toggleCheckIn(bk),
                            disabled:!!busy[bk.id]
                          },busy[bk.id]?"...":bk.checked_in?"Undo":"Check In")
                        ))
                  )
                );
              })
        ),
    React.createElement("div",{className:"kiosk-footer"},
      React.createElement("div",{className:"footer-tagline"},"COMMITMENT. CONSISTENCY. DETERMINATION."),
      React.createElement("div",{className:"footer-powered"},
        "POWERED BY ",
        React.createElement("a",{href:"https://www.lamontcollective.com",target:"_blank",rel:"noopener"},"WWW.LAMONTCOLLECTIVE.COM")
      ),
      React.createElement("div",{className:"refresh-row"},
        React.createElement("div",{className:"refresh-lbl"},`LAST UPDATED ${refreshStr}`),
        React.createElement("button",{className:"refresh-btn",onClick:loadData},"REFRESH")
      )
    ),
    React.createElement("div",{className:`toast${toast.show?" show":""}`},toast.msg)
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
