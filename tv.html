*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080808;color:#fff;font-family:'DM Sans',sans-serif;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
#cast{position:fixed;top:10px;left:12px;z-index:10;display:none;background:#0a1a2a;color:#1d9bf0;border:1px solid #1d3a5a;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.12em;padding:7px 16px;cursor:pointer}
#err{color:#777;font-size:14px;letter-spacing:0.06em;text-align:center;padding:40px}
#fit{width:100vw;padding:2.4vh 3vw;transform-origin:center center}
h1{font-family:'Syncopate',sans-serif;font-weight:700;font-size:22px;letter-spacing:0.1em;text-align:center;margin-bottom:8px}
.wname{color:#1d9bf0}
.rd{margin-bottom:24px}
.sec{display:flex;align-items:baseline;gap:12px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.1em;background:#0a1a2a;border:1px solid #565656;border-radius:6px;padding:3px 11px;margin-bottom:12px}
.rnm{color:#1d9bf0}.rtot{color:#cfe3f5;font-size:12px;font-weight:400;font-family:'DM Sans',sans-serif;letter-spacing:0.08em}
.sts{display:grid;grid-template-columns:repeat(5,1fr);grid-auto-rows:1fr;gap:16px}
.cell{display:flex;flex-direction:column}
.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:baseline;gap:8px;margin-bottom:3px;padding:0 3px}
.stn{font-size:11px;font-weight:400;letter-spacing:0.12em;color:#fff;text-align:left}
.trep{font-size:13px;font-weight:700;letter-spacing:0.05em;color:#1d9bf0;text-align:center;white-space:nowrap}
.sdur{font-size:11px;font-weight:400;letter-spacing:0.12em;color:#fff;text-align:right}
.st{flex:1;background:#202020;border:1px solid #565656;border-radius:9px;padding:9px 9px;display:flex;flex-direction:column}
.ex{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.09em;line-height:1.12;text-align:center;margin-bottom:2px}
.mao{font-size:11px;font-style:italic;color:#1d9bf0;text-align:center;line-height:1.1;margin-bottom:6px}
.lv{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:auto}
.lvc{display:flex;flex-direction:column}
.lvn{font-size:9px;letter-spacing:0.02em;color:#fff;font-weight:600;text-align:center;margin-bottom:3px}
.lvb{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;background:#0a1a2a;border:1px solid #565656;border-radius:5px;padding:5px 3px;font-size:14px;color:#fff;line-height:1.15;min-height:24px}

  var parts=groups.map(function(g){return '<div class="rd">'+(g.hideTv?"":'<div class="sec"><span class="rnm">'+esc(g.hdr)+'</span><span class="rtot">'+((g.dur&&g.dur.trim())?esc(g.dur.trim()):fmtSecs(roundSecs(g.sts)))+'</span></div>')+'<div class="sts">'+g.sts.map(stCard).join("")+'</div></div>';}).join("");
  var fit=document.getElementById("fit");
  fit.innerHTML='<h1>TEAM 365 <span class="wname">'+esc(name)+'</span></h1>'+parts;
  document.getElementById("err").style.display="none";
  doFit();
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(doFit);
  setTimeout(doFit,300);
}
function doFit(){var f=document.getElementById("fit");if(!f)return;f.style.transform="none";var s=Math.min(window.innerWidth/f.offsetWidth,window.innerHeight/f.offsetHeight);f.style.transform="scale("+s+")";}
window.addEventListener("resize",doFit);
// cast
(function(){
  var btn=document.getElementById("cast");
  if("PresentationRequest" in window){
    btn.style.display="block";
    try{
      var req=new PresentationRequest([location.href]);
      try{req.getAvailability().then(function(){}).catch(function(){});}catch(e){}
      btn.onclick=function(){try{req.start().then(function(){}).catch(function(){});}catch(e){}};
    }catch(e){}
  }else{
    btn.style.display="block";
    btn.textContent="▸ OPEN IN CHROME TO CAST";
    btn.onclick=function(){try{alert("To cast, open this page in the Chrome app (not an in-app browser), then tap the Cast button or Chrome menu ⋮ → Cast.");}catch(e){}};
  }
})();
// load
var params=new URLSearchParams(location.search);
var wname=(params.get("w")||"").toUpperCase();
if(!wname){document.getElementById("err").textContent="No workout specified.";}
else{
  Promise.all([
    sbGet("coaching_notes","class_name=eq."+encodeURIComponent("__WORKOUT__"+wname)+"&select=content")
  ]).then(function(res){
    var rows=null;
    if(res[0]&&res[0].length&&res[0][0].content){try{var p=JSON.parse(res[0][0].content);if(Array.isArray(p)&&p.length)rows=p;}catch(e){}}
    if(!rows)rows=(WK_SEED[wname]||[]);
    render(wname,normalize(rows));
  });
}

</script>
