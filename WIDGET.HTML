<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#080808"/>
<title>Team 365 · Book a Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080808;min-height:100vh}
body{font-family:'DM Sans',sans-serif;color:#fff}
#root{min-height:100vh}
.widget{background:#080808;min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;padding:28px 16px 48px}
/* Logo */
.w-logo-area{text-align:center;margin-bottom:28px}
.w-logo-sub{font-size:9px;letter-spacing:0.22em;color:#777;font-weight:500}
.w-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.15em;color:#fff}
.w-logo-tag{font-size:7px;letter-spacing:0.2em;color:#444;margin-top:1px}
/* Step heading */
.w-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.12em;color:#fff;margin-bottom:5px}
.w-sub{font-size:10px;letter-spacing:0.14em;color:#555;font-weight:600;margin-bottom:22px}
/* Progress dots */
.w-dots{display:flex;gap:6px;justify-content:center;margin-bottom:28px}
.w-dot{width:6px;height:6px;border-radius:50%;background:#1a1a1a;transition:all .2s}
.w-dot.active{background:#fff;width:18px;border-radius:3px}
.w-dot.done{background:#444}
/* Type cards */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.type-card{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:10px;padding:22px 14px;cursor:pointer;transition:all .2s;text-align:center}
.type-card:hover{border-color:#333;background:#111}
.type-icon{font-size:30px;margin-bottom:10px}
.type-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.1em;color:#fff}
.type-desc{font-size:9px;letter-spacing:0.1em;color:#555;margin-top:5px;line-height:1.6}
/* Week nav */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.wk-arrow{background:none;border:none;color:#888;cursor:pointer;font-size:22px;padding:4px 10px;line-height:1;transition:color .15s}
.wk-arrow:hover:not(:disabled){color:#fff}
.wk-arrow:disabled{color:#222;cursor:default}
.wk-label{flex:1;text-align:center;font-size:10px;letter-spacing:0.16em;color:#fff;font-weight:600}
/* Day strip */
.day-strip{display:flex;gap:5px;overflow-x:auto;margin-bottom:16px;scrollbar-width:none;padding-bottom:2px}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;background:#0e0e0e;border:1px solid #222;border-radius:6px;cursor:pointer;transition:all .15s;min-width:50px}
.day-btn:hover:not(.da){border-color:#444}
.day-btn.dt{border-color:#555}
.day-btn.da{background:#fff;border-color:#fff}
.d-name{font-size:9px;letter-spacing:0.12em;font-weight:600;color:#999}
.d-num{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;color:#777}
.day-btn.dt .d-num{color:#fff}
.day-btn.dt .d-name{color:#ccc}
.day-btn.da .d-name,.day-btn.da .d-num{color:#000}
/* Session label */
.sess-lbl{font-size:9px;letter-spacing:0.2em;color:#555;font-weight:600;margin-bottom:12px}
/* Slots */
.slot-list{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.slot-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#0e0e0e;border:1px solid #1e1e1e;border-radius:7px;cursor:pointer;transition:all .15s}
.slot-row:hover:not(.full):not(.past){border-color:#333}
.slot-row.sel{border-color:#fff;background:#111}
.slot-row.full{opacity:0.3;cursor:default}
.slot-row.past{opacity:0.2;cursor:default;pointer-events:none}
.slot-time{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;min-width:72px}
.slot-mid{flex:1}
.slot-bars{display:flex;gap:2px;margin-bottom:5px}
.slot-bar{flex:1;height:2px;border-radius:1px;background:#222;transition:background .3s}
.slot-bar.t{background:#fff}
.slot-info{font-size:10px;letter-spacing:0.1em;font-weight:500}
.slot-info.av{color:#aaa}
.slot-info.lo{color:#e06040}
.slot-info.fl{color:#444}
.slot-info.ok{color:#4aaa66}
.slot-radio{width:18px;height:18px;border-radius:50%;border:1.5px solid #2a2a2a;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.slot-row.sel .slot-radio{border-color:#fff;background:#fff}
.slot-radio-dot{width:8px;height:8px;border-radius:50%;background:#000}
/* Form */
.form-group{margin-bottom:14px}
.fl{display:block;font-size:10px;letter-spacing:0.18em;color:#bbb;font-weight:600;margin-bottom:7px}
.fi{width:100%;background:#0e0e0e;border:1px solid #2a2a2a;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;padding:14px 15px;outline:none;border-radius:3px;transition:border-color .2s;-webkit-appearance:none}
.fi:focus{border-color:#555}
.fi::placeholder{color:#333}
/* Summary card */
.summ{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:8px;padding:16px;margin-bottom:20px}
.summ-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #111}
.summ-row:last-child{border-bottom:none}
.summ-lbl{font-size:10px;letter-spacing:0.12em;color:#555;font-weight:500}
.summ-val{font-size:10px;letter-spacing:0.08em;color:#ccc;font-weight:500;text-align:right}
/* Payment */
.pay-lbl{font-size:10px;letter-spacing:0.18em;color:#bbb;font-weight:600;margin-bottom:10px}
.pay-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.pay-opt{padding:14px 10px;background:#0e0e0e;border:1px solid #1e1e1e;border-radius:7px;text-align:center;transition:all .15s}
.pay-opt.clickable{cursor:pointer}
.pay-opt.clickable:hover{border-color:#333}
.pay-opt.sel{border-color:#fff}
.pay-opt.dim{opacity:0.3;cursor:default}
.pay-icon{font-size:20px;margin-bottom:7px}
.pay-name{font-size:11px;letter-spacing:0.1em;color:#ccc;font-weight:600}
.pay-hint{font-size:9px;letter-spacing:0.06em;color:#444;margin-top:3px}
/* Buttons */
.btn-p{width:100%;background:#fff;color:#000;border:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.18em;padding:17px;cursor:pointer;border-radius:3px;transition:background .15s;margin-bottom:10px}
.btn-p:hover:not(:disabled){background:#ddd}
.btn-p:disabled{background:#111;color:#333;cursor:not-allowed}
.btn-g{width:100%;background:transparent;color:#555;border:1px solid #1e1e1e;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.16em;padding:14px;cursor:pointer;border-radius:3px;transition:all .15s}
.btn-g:hover{border-color:#333;color:#aaa}
/* Confirmation */
.conf{text-align:center;padding:10px 0}
.conf-icon{font-size:54px;margin-bottom:16px}
.conf-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.12em;margin-bottom:6px}
.conf-msg{font-size:12px;letter-spacing:0.04em;color:#777;line-height:1.9;margin-bottom:24px}
.ref-box{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:7px;padding:16px;text-align:center;margin-bottom:20px}
.ref-lbl{font-size:9px;letter-spacing:0.2em;color:#555;margin-bottom:5px}
.ref-code{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.14em;color:#fff}
/* Error */
.err-msg{font-size:12px;color:#e06040;letter-spacing:0.04em;margin-bottom:12px;line-height:1.5}
/* Loading */
.loading{text-align:center;padding:40px 0;font-size:10px;letter-spacing:0.22em;color:#333}
.load-bar{width:80px;height:1px;background:#1a1a1a;border-radius:1px;overflow:hidden;margin:12px auto 0}
.load-fill{height:100%;background:#fff;animation:ld 1.5s ease-in-out infinite}
@keyframes ld{0%{width:0}50%{width:100%}100%{width:0}}
/* Guest notice */
.guest-notice{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:12px 14px;margin-bottom:16px;font-size:10px;letter-spacing:0.06em;color:#555;line-height:1.7}
.guest-notice a{color:#888;text-decoration:underline;text-underline-offset:3px}
.guest-notice a:hover{color:#fff}
/* Footer */
.w-foot{text-align:center;font-size:7px;letter-spacing:0.18em;color:#2a2a2a;margin-top:auto;padding-top:28px}
</style>
</head>
<body>
<div id="root"><div class="loading" style="padding:80px 0">LOADING<div class="load-bar"><div class="load-fill"></div></div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const{useState,useEffect}=React;

// ── Config ─────────────────────────────────────────────────────────────────────
const SB_URL="https://xczwmexavysvljmobbgv.supabase.co";
const SB_KEY="sb_publishable_tujGGhPRUimflq1-IFzuvA_Crw6knMO";
const SB_HDR={"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":"return=minimal"};
const APPS_URL="https://script.google.com/macros/s/AKfycbz5cruljVDUVScwm14Sj1z5_6cRrNK9cgOaq7Tx8P9LfPAEI7p_kx8ZJnaghF_SmU46Fw/exec";
const MAX_SPOTS=10;
const WD_TIMES=["05:15","06:15","07:15","09:15","12:00","17:15","18:15","19:15"];
const SAT_TIMES=["06:30","07:30","08:30","09:30"];
const WELL_TIMES=["06:00","08:00","10:00","12:00","14:00","16:00","18:00"];
const DAY_SHORT=["Mon","Tue","Wed","Thu","Fri","Sat"];
const DAY_LONG=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAY_SESS=["Rise Up","Strength Lower","Ascend","Strength Upper","Elevate","Summit"];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// ── Helpers ────────────────────────────────────────────────────────────────────
const mondayOf=d=>{const x=new Date(d);x.setHours(0,0,0,0);const day=x.getDay();x.setDate(x.getDate()-(day===0?6:day-1));return x;};
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const toDS=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const isToday=d=>toDS(d)===toDS(new Date());
const isPastD=d=>toDS(d)<toDS(new Date());
const fmt12=t=>{const[h,m]=t.split(":").map(Number);return`${h%12||12}:${String(m).padStart(2,"0")}${h<12?"am":"pm"}`;};
const getWeekStart=()=>{const now=new Date();const m=mondayOf(now);return now.getDay()===0?addDays(m,7):m;};
function genRef(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let r="T365-";for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r;}
function isPastSlot(date,time){
  if(isPastD(date))return true;
  if(!isToday(date))return false;
  const now=new Date();const[h,m]=time.split(":").map(Number);
  return(h*60+m+30)<(now.getHours()*60+now.getMinutes());
}

// ── Supabase ───────────────────────────────────────────────────────────────────
async function sbGet(t,q=""){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:SB_HDR});return r.ok?await r.json():[];}catch{return[];}}
async function sbPost(t,d){try{const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:"POST",headers:SB_HDR,body:JSON.stringify(d)});return r.ok;}catch{return false;}}

// ── Notify admin ───────────────────────────────────────────────────────────────
async function notifyAdmin(data){
  try{
    const p=new URLSearchParams({action:"guestBooking",...data});
    await fetch(APPS_URL+"?"+p.toString(),{method:"GET",mode:"no-cors"});
  }catch(e){console.log("notify:",e);}
}

// ── Widget ─────────────────────────────────────────────────────────────────────
function BookingWidget(){
  const[step,setStep]=useState(0);           // 0=type 1=datetime 2=details 3=confirm
  const[bookType,setBookType]=useState(null); // 'class' | 'wellness'
  const[weekStart,setWeekStart]=useState(getWeekStart);
  const[selDay,setSelDay]=useState(()=>{const d=new Date().getDay();return d===0?0:Math.min(d-1,5);});
  const[selTime,setSelTime]=useState(null);
  const[bookings,setBookings]=useState([]);
  const[wellBks,setWellBks]=useState([]);
  const[loading,setLoading]=useState(false);
  const[form,setForm]=useState({name:"",email:"",phone:""});
  const[payment,setPayment]=useState("gym");
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState("");
  const[conf,setConf]=useState(null);

  const weekDates=Array.from({length:6},(_,i)=>addDays(weekStart,i));
  const isThisWeek=toDS(weekStart)===toDS(mondayOf(new Date()));
  const selDate=weekDates[selDay];
  const selDK=toDS(selDate);

  // Load availability when type or week changes
  useEffect(()=>{
    if(!bookType)return;
    setLoading(true);setSelTime(null);
    const keys=weekDates.map(toDS).filter(Boolean);
    if(bookType==="class"){
      sbGet("bookings",`date_key=in.(${keys.join(",")})&select=date_key,time`).then(d=>{setBookings(d||[]);setLoading(false);});
    }else{
      sbGet("wellness_bookings",`date_key=in.(${keys.join(",")})&select=date_key,time`).then(d=>{setWellBks(d||[]);setLoading(false);});
    }
  },[bookType,weekStart]);

  useEffect(()=>{setSelTime(null);},[selDay]);

  // Availability calcs
  const classSlots=t=>{const taken=bookings.filter(b=>b.date_key===selDK&&b.time===t).length;return{taken,left:MAX_SPOTS-taken};};
  const wellSlotTaken=t=>wellBks.some(b=>b.date_key===selDK&&b.time===t);

  async function handleBook(){
    const nm=form.name.trim(),em=form.email.trim().toLowerCase(),ph=form.phone.trim();
    if(!nm){setErr("Please enter your full name.");return;}
    if(!em||!em.includes("@")||!em.includes(".")){setErr("Please enter a valid email address.");return;}
    setErr("");setBusy(true);
    const ref=genRef();
    const row={email:em,name:nm,date_key:selDK,time:selTime,is_guest:true,booking_ref:ref,phone:ph,created_at:Date.now()};
    const ok=await sbPost(bookType==="class"?"bookings":"wellness_bookings",row);
    if(!ok){setErr("Booking failed — please try again.");setBusy(false);return;}
    const dateLabel=`${DAY_LONG[selDay]} ${selDate.getDate()} ${MONTHS[selDate.getMonth()]}`;
    const timeLabel=fmt12(selTime);
    const sessName=bookType==="class"?DAY_SESS[selDay]:null;
    // Notify admin
    notifyAdmin({guestName:nm,guestEmail:em,guestPhone:ph||"N/A",bookingType:bookType==="class"?`Class – ${sessName}`:"Sauna + Cold Plunge",dateLabel,timeLabel,bookingRef:ref,payment:payment==="gym"?"Pay at gym":"Online"});
    setConf({ref,nm,em,type:bookType,dateLabel,timeLabel,sessName});
    setStep(3);setBusy(false);
  }

  function reset(){
    setStep(0);setBookType(null);setSelTime(null);
    setSelDay(()=>{const d=new Date().getDay();return d===0?0:Math.min(d-1,5);});
    setWeekStart(getWeekStart());setForm({name:"",email:"",phone:""});
    setPayment("gym");setConf(null);setErr("");
  }

  function goType(type){setBookType(type);setStep(1);}
  function goBack(){setStep(s=>s-1);setSelTime(null);setErr("");}

  const curTimes=bookType==="class"?(selDate.getDay()===6?SAT_TIMES:WD_TIMES):WELL_TIMES;

  return React.createElement("div",{className:"widget"},

    // ── Logo ────────────────────────────────────────────────────────────────────
    React.createElement("div",{className:"w-logo-area"},
      React.createElement("div",{className:"w-logo-sub"},"LAMONT"),
      React.createElement("div",{className:"w-logo"},"TEAM 365"),
      React.createElement("div",{className:"w-logo-tag"},"EVERYDAY. ALL YEAR ROUND.")
    ),

    // ── Progress dots (steps 1–2) ───────────────────────────────────────────────
    step>0&&step<3&&React.createElement("div",{className:"w-dots"},
      [0,1,2].map(i=>React.createElement("div",{key:i,className:`w-dot${step-1===i?" active":step-1>i?" done":""}`}))
    ),

    // ── STEP 0: Choose type ─────────────────────────────────────────────────────
    step===0&&React.createElement(React.Fragment,null,
      React.createElement("div",{className:"w-title"},"BOOK A SESSION"),
      React.createElement("div",{className:"w-sub"},"WHAT WOULD YOU LIKE TO BOOK?"),
      React.createElement("div",{className:"type-grid"},
        React.createElement("div",{className:"type-card",onClick:()=>goType("class")},
          React.createElement("div",{className:"type-icon"},"💪"),
          React.createElement("div",{className:"type-label"},"BOOK A CLASS"),
          React.createElement("div",{className:"type-desc"},"MON – SAT\nUP TO 10 SPOTS PER CLASS")
        ),
        React.createElement("div",{className:"type-card",onClick:()=>goType("wellness")},
          React.createElement("div",{className:"type-icon"},"🧖"),
          React.createElement("div",{className:"type-label"},"SAUNA + COLD PLUNGE"),
          React.createElement("div",{className:"type-desc"},"MON – SAT\nSOLO SESSIONS · EVERY 2 HRS")
        )
      ),
      React.createElement("div",{className:"guest-notice"},
        "Already a member? ",
        React.createElement("a",{href:"https://team365-booking.vercel.app",target:"_blank"},"Log in to your account"),
        " for full access to your bookings, profile and history."
      )
    ),

    // ── STEP 1: Day + Time ──────────────────────────────────────────────────────
    step===1&&React.createElement(React.Fragment,null,
      React.createElement("div",{className:"w-title"},bookType==="class"?"PICK A CLASS":"PICK A SESSION"),
      React.createElement("div",{className:"w-sub"},bookType==="class"?"SELECT DAY AND TIME":"SELECT YOUR PREFERRED SLOT"),

      // Week nav
      React.createElement("div",{className:"week-nav"},
        React.createElement("button",{className:"wk-arrow",onClick:()=>setWeekStart(w=>addDays(w,-7)),disabled:isThisWeek},"‹"),
        React.createElement("div",{className:"wk-label"},
          `${MONTHS[weekDates[0].getMonth()]} ${weekDates[0].getDate()} – ${MONTHS[weekDates[5].getMonth()]} ${weekDates[5].getDate()} ${weekDates[0].getFullYear()}`
        ),
        React.createElement("button",{className:"wk-arrow",onClick:()=>setWeekStart(w=>addDays(w,7))},"›")
      ),

      // Day strip
      React.createElement("div",{className:"day-strip"},
        weekDates.map((d,i)=>React.createElement("button",{key:i,className:`day-btn${i===selDay?" da":""}${isToday(d)?" dt":""}`,onClick:()=>setSelDay(i)},
          React.createElement("div",{className:"d-name"},DAY_SHORT[i]),
          React.createElement("div",{className:"d-num"},d.getDate())
        ))
      ),

      // Session label (classes only)
      bookType==="class"&&React.createElement("div",{className:"sess-lbl"},
        `${DAY_LONG[selDay].toUpperCase()} · ${DAY_SESS[selDay].toUpperCase()} · ${curTimes.length} CLASSES`
      ),
      bookType==="wellness"&&React.createElement("div",{className:"sess-lbl"},
        `${DAY_LONG[selDay].toUpperCase()} · SAUNA + COLD PLUNGE`
      ),

      // Slots
      loading
        ?React.createElement("div",{className:"loading"},"CHECKING AVAILABILITY…",React.createElement("div",{className:"load-bar"},React.createElement("div",{className:"load-fill"})))
        :React.createElement("div",{className:"slot-list"},
          curTimes.map(time=>{
            const past=isPastSlot(selDate,time);
            if(bookType==="class"){
              const{taken,left}=classSlots(time);
              const full=left===0;
              const low=left<=3&&left>0;
              return React.createElement("div",{key:time,
                className:`slot-row${selTime===time?" sel":""}${full?" full":""}${past?" past":""}`,
                onClick:()=>{if(!full&&!past)setSelTime(time);}},
                React.createElement("div",{className:"slot-time"},fmt12(time)),
                React.createElement("div",{className:"slot-mid"},
                  React.createElement("div",{className:"slot-bars"},
                    Array.from({length:MAX_SPOTS}).map((_,i)=>React.createElement("div",{key:i,className:`slot-bar${i<taken?" t":""}`}))
                  ),
                  React.createElement("div",{className:`slot-info ${full?"fl":low?"lo":"av"}`},
                    full?"Full":`${left} spot${left===1?"":"s"} available`
                  )
                ),
                !full&&!past&&React.createElement("div",{className:"slot-radio"},
                  selTime===time&&React.createElement("div",{className:"slot-radio-dot"})
                )
              );
            }else{
              const taken=wellSlotTaken(time);
              return React.createElement("div",{key:time,
                className:`slot-row${selTime===time?" sel":""}${taken?" full":""}${past?" past":""}`,
                onClick:()=>{if(!taken&&!past)setSelTime(time);}},
                React.createElement("div",{className:"slot-time"},fmt12(time)),
                React.createElement("div",{className:"slot-mid"},
                  React.createElement("div",{className:`slot-info ${taken?"fl":"ok"}`},
                    taken?"Unavailable":"Available"
                  )
                ),
                !taken&&!past&&React.createElement("div",{className:"slot-radio"},
                  selTime===time&&React.createElement("div",{className:"slot-radio-dot"})
                )
              );
            }
          })
        ),

      React.createElement("button",{className:"btn-p",onClick:()=>setStep(2),disabled:!selTime},"CONTINUE"),
      React.createElement("button",{className:"btn-g",onClick:goBack},"BACK")
    ),

    // ── STEP 2: Guest details ───────────────────────────────────────────────────
    step===2&&React.createElement(React.Fragment,null,
