<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Team 365"/>
<meta name="theme-color" content="#080808"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>Team 365 · Book a Class</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080808;min-height:100vh}
#root{min-height:100vh}
.app{font-family:'DM Sans',sans-serif;background:#080808;color:#fff;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.hdr{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center}
.logo-area{text-align:center;margin-bottom:0}
.logo-sub{font-size:9px;letter-spacing:0.22em;color:#aaa;font-weight:500;text-align:center}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.15em;line-height:1;color:#fff;text-align:center}
.logo-tag{font-size:7px;letter-spacing:0.2em;color:#555;text-align:center;margin-top:1px}
.avatar-sm{width:38px;height:38px;border-radius:50%;object-fit:cover;border:1px solid #444;cursor:pointer;display:block}
.avatar-init-sm{width:38px;height:38px;border-radius:50%;background:#1a1a1a;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:#999;cursor:pointer;flex-shrink:0}
.name-lbl{font-size:10px;letter-spacing:0.12em;color:#fff;font-weight:600;text-align:center;margin-top:5px}
.edit-lbl{font-size:9px;letter-spacing:0.1em;color:#888;text-align:center;margin-top:1px}
.week-nav{display:flex;align-items:center;padding:18px 14px 0}
.wk-arrow{background:none;border:none;color:#888;cursor:pointer;font-size:24px;padding:4px 10px;line-height:1;transition:color .15s}
.wk-arrow:hover:not(:disabled){color:#fff}
.wk-arrow:disabled{color:#333;cursor:default}
.wk-label{flex:1;text-align:center;font-size:10px;letter-spacing:0.18em;color:#fff;font-weight:600}
.day-strip{display:flex;gap:5px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-btn{flex:1;min-width:44px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;background:#0e0e0e;border:1px solid #222;border-radius:6px;cursor:pointer;transition:all .15s}
.day-btn:hover:not(.da){border-color:#444}
.day-btn.dt{border-color:#555}
.day-btn.da{background:#fff;border-color:#fff}
.d-name{font-size:9px;letter-spacing:0.12em;font-weight:600;color:#999}
.d-num{font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;color:#777}
.day-btn.dt .d-num{color:#fff}
.day-btn.dt .d-name{color:#ccc}
.day-btn.da .d-name,.day-btn.da .d-num{color:#000}
.d-dot{width:4px;height:4px;border-radius:50%;background:transparent}
.day-btn.dhb .d-dot{background:#666}
.day-btn.da.dhb .d-dot{background:#888}
.cls-wrap{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:7px}
.day-hdr{font-size:9px;letter-spacing:0.22em;font-weight:600;margin-bottom:6px;line-height:1.6}
.day-hdr span{color:#fff}
.day-hdr em{color:#aaa;font-style:normal}
.c-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:#0e0e0e;border:1px solid #1e1e1e;border-radius:7px;transition:border-color .15s}
.c-row.cb{border-color:#333}
.c-row.cp{opacity:0.3;pointer-events:none}
.c-time{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.03em;color:#fff;min-width:72px}
.c-mid{flex:1;display:flex;flex-direction:column;gap:5px}
.c-bars{display:flex;gap:2px}
.c-bar{flex:1;height:2px;border-radius:1px;background:#2a2a2a;transition:background .3s}
.c-bar.ct{background:#fff}
.c-sub{font-size:10px;letter-spacing:0.1em;color:#999;font-weight:500}
.c-sub.cl{color:#e06040}
.c-sub.co{color:#aaa}
.c-sub.ck{color:#777}
.c-sub.cf{color:#555}
.c-btn{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:0.12em;padding:8px 12px;border-radius:3px;border:none;cursor:pointer;white-space:nowrap;transition:all .15s}
.c-btn.bb{background:#fff;color:#000}
.c-btn.bb:hover:not(:disabled){background:#ddd}
.c-btn.bf{background:transparent;color:#555;border:1px solid #2a2a2a;cursor:default;font-size:10px}
.c-btn.bc{background:transparent;color:#8a2515;border:1px solid #3a1208;cursor:pointer;font-size:10px}
.c-btn.bc:hover{border-color:#8a2515;color:#e06040}
.c-btn:disabled{opacity:.4;cursor:not-allowed}
.my-wrap{padding:18px 16px;flex:1;overflow-y:auto}
.my-hdr{font-size:10px;letter-spacing:0.22em;color:#fff;font-weight:600;margin-bottom:14px}
.my-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#0e0e0e;border:1px solid #1e1e1e;border-radius:7px;margin-bottom:7px}
.my-date{font-size:10px;letter-spacing:0.12em;color:#999;font-weight:500;margin-bottom:2px}
.my-time{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff}
.my-sess{font-size:9px;letter-spacing:0.1em;color:#777;margin-top:1px}
.my-x{font-size:10px;letter-spacing:0.08em;color:#666;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .15s;font-weight:500}
.my-x:hover{color:#e06040}
.no-bk{text-align:center;padding:48px 0;font-size:11px;letter-spacing:0.16em;color:#444;line-height:2.4}
.well-wrap{flex:1;overflow-y:auto}
.well-hdr{padding:16px 16px 0}
.well-title{font-size:10px;letter-spacing:0.22em;color:#fff;font-weight:600}
.well-sub{font-size:9px;letter-spacing:0.14em;color:#888;font-weight:500;margin-bottom:14px}
.well-badge{display:inline-flex;align-items:center;gap:6px;background:#111;border:1px solid #222;border-radius:20px;padding:4px 10px;margin-bottom:14px}
.well-badge-dot{width:6px;height:6px;border-radius:50%;background:#4aaa66}
.well-badge-txt{font-size:9px;letter-spacing:0.14em;color:#888;font-weight:600}
.well-slots{padding:0 16px 16px;display:flex;flex-direction:column;gap:7px}
.well-slot{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#0e0e0e;border:1px solid #1e1e1e;border-radius:7px}
.well-slot.ws-mine{border-color:#2a3a2a}
.well-slot.ws-past{opacity:0.3;pointer-events:none}
.well-slot-time{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;min-width:72px}
.well-slot-mid{flex:1}
.well-slot-name{font-size:11px;letter-spacing:0.08em;color:#aaa;font-weight:500}
.well-slot-status{font-size:10px;letter-spacing:0.1em;color:#999;font-weight:500;margin-top:2px}
.well-slot-status.wss-mine{color:#4aaa66}
.well-slot-status.wss-taken{color:#e06040}
.well-btn{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:0.12em;padding:8px 12px;border-radius:3px;border:none;cursor:pointer;white-space:nowrap;transition:all .15s}
.well-btn.wb-book{background:#fff;color:#000}
.well-btn.wb-book:hover:not(:disabled){background:#ddd}
.well-btn.wb-taken{background:transparent;color:#555;border:1px solid #2a2a2a;cursor:default;font-size:10px}
.well-btn.wb-cancel{background:transparent;color:#8a2515;border:1px solid #3a1208;font-size:10px;cursor:pointer}
.well-btn.wb-cancel:hover{border-color:#8a2515;color:#e06040}
.well-btn:disabled{opacity:.4;cursor:not-allowed}
.comm-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
.comm-hdr{padding:16px 16px 0;flex-shrink:0}
.comm-title{font-size:10px;letter-spacing:0.22em;color:#fff;font-weight:600;margin-bottom:2px}
.comm-sub{font-size:9px;letter-spacing:0.14em;color:#888;font-weight:500;margin-bottom:12px}
.comm-compose{background:#0e0e0e;border:1px solid #2a2a2a;border-radius:8px;padding:12px;margin-bottom:12px}
.comm-textarea{width:100%;background:transparent;border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;resize:none;outline:none;min-height:60px;line-height:1.6}
.comm-textarea::placeholder{color:#666}
.comm-compose-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #1a1a1a}
.comm-char{font-size:9px;letter-spacing:0.1em;color:#777;font-weight:500}
.comm-char.warn{color:#e06040}
.comm-post-btn{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.14em;padding:8px 18px;background:#fff;color:#000;border:none;border-radius:3px;cursor:pointer;transition:background .15s}
.comm-post-btn:hover:not(:disabled){background:#ddd}
.comm-post-btn:disabled{background:#2a2a2a;color:#777;cursor:not-allowed}
.comm-feed{flex:1;overflow-y:auto;padding:0 16px 16px}
.comm-feed::-webkit-scrollbar{width:0}
.post-card{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:8px;padding:13px 14px;margin-bottom:8px}
.post-card.pinned-post{border-color:#2a2a2a;background:#111;border-left:2px solid #fff}
.post-pin-label{font-size:8px;letter-spacing:0.18em;color:#888;font-weight:600;margin-bottom:8px}
.post-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.post-author{display:flex;align-items:center;gap:9px}
.post-av-img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid #333;flex-shrink:0}
.post-av-init{width:30px;height:30px;border-radius:50%;background:#1a1a1a;border:1px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;color:#777;flex-shrink:0}
.post-av-init.admin-av{border-color:#444;color:#aaa}
.post-name{font-size:12px;letter-spacing:0.06em;color:#fff;font-weight:600}
.post-badge{font-size:8px;letter-spacing:0.14em;color:#777;font-weight:600;margin-top:1px}
.post-badge.admin-badge{color:#aaa}
.post-time{font-size:9px;letter-spacing:0.06em;color:#444;font-weight:500;white-space:nowrap;margin-top:2px}
.post-content{font-size:13px;color:#ddd;line-height:1.65;font-weight:300;word-break:break-word;margin-bottom:10px}
.post-actions{display:flex;align-items:center;gap:14px}
.post-like-btn{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:0;transition:opacity .15s}
.post-like-btn:hover{opacity:0.7}
.post-like-icon{font-size:14px;line-height:1;color:#cc2200}
.post-like-count{font-size:10px;letter-spacing:0.06em;color:#888;font-weight:500}
.post-like-btn.liked .post-like-count{color:#cc2200}
.post-delete{background:none;border:none;color:#333;cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;letter-spacing:0.06em;transition:color .15s;font-weight:500}
.post-delete:hover{color:#e06040}
.post-pin-btn{background:none;border:none;color:#444;cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;letter-spacing:0.06em;transition:color .15s;font-weight:500}
.post-pin-btn:hover{color:#aaa}
.post-pin-btn.pinned{color:#888}
.comm-loading{text-align:center;padding:32px;font-size:10px;letter-spacing:0.18em;color:#333}
.comm-empty{text-align:center;padding:48px 16px;font-size:11px;letter-spacing:0.16em;color:#333;line-height:2.4}
.tab-bar{display:flex;border-top:1px solid #1a1a1a;margin-top:auto}
.tab-btn{flex:1;padding:12px 2px;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:8.5px;letter-spacing:0.12em;color:#777;font-weight:600;transition:color .15s;white-space:nowrap;position:relative}
.tab-btn.ta{color:#fff;border-top:1px solid #fff;margin-top:-1px}
.tab-btn:hover:not(.ta){color:#bbb}
.tab-dot{position:absolute;top:8px;right:calc(50% - 14px);width:7px;height:7px;background:#e06040;border-radius:50%;border:1px solid #080808}
/* Reply styles */
.post-reply-btn{background:none;border:none;color:#444;cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif;letter-spacing:0.06em;transition:color .15s;font-weight:500}
.post-reply-btn:hover{color:#aaa}
.reply-compose{background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:10px;margin-top:8px}
.reply-textarea{width:100%;background:transparent;border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;resize:none;outline:none;min-height:44px;line-height:1.6}
.reply-textarea::placeholder{color:#444}
.reply-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid #1a1a1a}
.reply-post-btn{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:0.12em;padding:6px 14px;background:#fff;color:#000;border:none;border-radius:3px;cursor:pointer}
.reply-post-btn:disabled{background:#222;color:#555;cursor:not-allowed}
.reply-cancel-btn{background:none;border:none;color:#555;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.06em}
.reply-card{background:#0a0a0a;border-left:2px solid #1d9bf0;padding:8px 10px;margin-top:6px;border-radius:0 4px 4px 0}
.reply-author{font-size:10px;color:#666;font-weight:600;letter-spacing:0.06em;margin-bottom:3px}
.reply-author span{color:#1d9bf0}
.reply-content{font-size:12px;color:#bbb;line-height:1.6;font-weight:300}
/* Tag styles */
.tag-highlight{color:#1d9bf0;font-weight:500}
.tag-dropdown{position:absolute;bottom:100%;left:0;right:0;background:#111;border:1px solid #2a2a2a;border-radius:6px;max-height:160px;overflow-y:auto;z-index:50;margin-bottom:4px}
.tag-option{padding:8px 12px;font-size:12px;color:#ccc;cursor:pointer;transition:background .1s}
.tag-option:hover{background:#1a1a1a}
.compose-wrap{position:relative}
.foot{text-align:center;font-size:9px;letter-spacing:0.22em;color:#fff;padding:9px 0 13px}
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:#fff;color:#000;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.15em;padding:10px 22px;border-radius:3px;pointer-events:none;transition:opacity .3s;z-index:200;white-space:nowrap;opacity:0}
.toast.show{opacity:1}
.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:#080808;font-family:'DM Sans',sans-serif}
.auth-logo-sub{font-size:9px;letter-spacing:0.22em;color:#777;font-weight:500;margin-bottom:4px;text-align:center}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:0.2em;margin-bottom:2px;color:#fff;text-align:center}
.auth-tag{font-size:8px;letter-spacing:0.22em;color:#555;margin-bottom:48px;font-weight:600;text-align:center}
.auth-card{width:100%;max-width:380px}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:0.1em;margin-bottom:24px;color:#fff}
.fl{display:block;font-size:10px;letter-spacing:0.18em;color:#bbb;font-weight:600;margin-bottom:7px}
.fi{width:100%;background:#0e0e0e;border:1px solid #2a2a2a;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:300;padding:14px 15px;margin-bottom:12px;outline:none;border-radius:3px;transition:border-color .2s;-webkit-appearance:none}
.fi:focus{border-color:#555}
.fi::placeholder{color:#444}
.auth-btn{width:100%;background:#fff;color:#000;border:none;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:0.18em;padding:18px;cursor:pointer;border-radius:3px;margin-top:4px;transition:background .15s}
.auth-btn:hover:not(:disabled){background:#ddd}
.auth-btn:disabled{background:#111;color:#444;cursor:not-allowed}
.auth-err{font-size:12px;color:#e06040;letter-spacing:0.04em;margin-top:12px;line-height:1.5}
.auth-sw{text-align:center;margin-top:22px;font-size:12px;color:#888;letter-spacing:0.04em}
.auth-sw button{background:none;border:none;color:#ccc;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;text-decoration:underline;text-underline-offset:3px;font-weight:500}
.auth-sw button:hover{color:#fff}
.auth-reg{text-align:center;margin-top:14px;font-size:11px;color:#555;letter-spacing:0.04em}
.auth-reg a{color:#888;text-decoration:underline;text-underline-offset:3px}
.auth-reg a:hover{color:#fff}
.prof-overlay{position:fixed;inset:0;background:#080808;z-index:50;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow-y:auto}
.prof-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;flex-shrink:0}
.prof-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.15em;color:#fff}
.prof-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px;transition:color .15s;line-height:1}
.prof-close:hover{color:#fff}
.prof-body{padding:22px 20px 48px}
.prof-since{font-size:10px;letter-spacing:0.18em;color:#777;margin-bottom:22px;font-weight:500}
.photo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:26px}
.avatar-lg{width:90px;height:90px;border-radius:50%;object-fit:cover;border:2px solid #333}
.avatar-init-lg{width:90px;height:90px;border-radius:50%;background:#111;border:2px solid #2a2a2a;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:34px;color:#555}
.prof-name-lbl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;color:#fff;margin-top:12px}
.photo-btn{margin-top:7px;background:none;border:none;color:#888;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.12em;transition:color .15s;text-decoration:underline;text-underline-offset:3px;font-weight:500}
.photo-btn:hover{color:#fff}
.prof-section{font-size:9px;letter-spacing:0.22em;color:#777;font-weight:600;margin:20px 0 13px;border-top:1px solid #1a1a1a;padding-top:20px}
.prof-save{width:100%;background:#fff;color:#000;border:none;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:0.18em;padding:17px;cursor:pointer;border-radius:3px;margin-top:6px;transition:background .15s}
.prof-save:hover:not(:disabled){background:#ddd}
.prof-save:disabled{background:#111;color:#444;cursor:not-allowed}
.prof-logout{width:100%;background:transparent;color:#777;border:1px solid #2a2a2a;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.18em;padding:15px;cursor:pointer;border-radius:3px;margin-top:10px;transition:all .15s}
.prof-logout:hover{border-color:#666;color:#aaa}
.prof-err{font-size:12px;color:#e06040;letter-spacing:0.04em;margin-top:10px;line-height:1.5}
.prof-ok{font-size:12px;color:#4aaa88;letter-spacing:0.06em;margin-top:10px;font-weight:500}
.crop-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.crop-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.15em;color:#fff;margin-bottom:20px}
.crop-canvas-wrap{position:relative;width:280px;height:280px;border-radius:50%;overflow:hidden;border:2px solid #444;cursor:grab;touch-action:none}
.crop-canvas-wrap:active{cursor:grabbing}
.crop-hint{font-size:11px;letter-spacing:0.1em;color:#777;margin-top:16px;text-align:center;line-height:1.8;font-weight:500}
.crop-actions{display:flex;gap:10px;margin-top:22px;width:100%;max-width:280px}
.crop-cancel{flex:1;background:transparent;color:#888;border:1px solid #333;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;padding:14px;cursor:pointer;border-radius:3px}
.crop-save{flex:1;background:#fff;color:#000;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.15em;padding:14px;cursor:pointer;border-radius:3px}
.zoom-wrap{display:flex;align-items:center;gap:12px;margin-top:16px;width:100%;max-width:280px}
.zoom-lbl{font-size:9px;letter-spacing:0.18em;color:#777;font-weight:600;white-space:nowrap}

function ImageCropper({imageSrc,onSave,onCancel}){
  const canvasRef=useRef(null);
  const [zoom,setZoom]=useState(1);

  const [imgEl,setImgEl]=useState(null);
  const drag=useRef(null);const lastDist=useRef(null);const SIZE=280;

  useEffect(()=>{if(!imgEl||!canvasRef.current)return;const canvas=canvasRef.current;const ctx=canvas.getContext("2d");canvas.width=SIZE;canvas.height=SIZE;ctx.clearRect(0,0,SIZE,SIZE);const w=imgEl.width*zoom,h=imgEl.height*zoom;ctx.drawImage(imgEl,SIZE/2-w/2+offset.x,SIZE/2-h/2+offset.y,w,h);},[imgEl,zoom,offset]);
  const getPos=e=>{const t=e.touches?e.touches[0]:e;const r=canvasRef.current.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top};};
  const onDown=e=>{e.preventDefault();drag.current=getPos(e);};
  const onMove=e=>{e.preventDefault();if(!drag.current)return;const p=getPos(e);setOffset(o=>({x:o.x+(p.x-drag.current.x),y:o.y+(p.y-drag.current.y)}));drag.current=p;};
  const onUp=()=>{drag.current=null;};
  const onTouchMove=e=>{if(e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.sqrt(dx*dx+dy*dy);if(lastDist.current)setZoom(z=>Math.max(0.3,Math.min(4,z+(dist-lastDist.current)*0.005)));lastDist.current=dist;}else onMove(e);};
  const onTouchEnd=()=>{lastDist.current=null;onUp();};
  const onWheel=e=>{e.preventDefault();setZoom(z=>Math.max(0.3,Math.min(4,z-e.deltaY*0.001)));};
  const handleSave=()=>{const out=document.createElement("canvas");out.width=200;out.height=200;out.getContext("2d").drawImage(canvasRef.current,0,0,SIZE,SIZE,0,0,200,200);onSave(out.toDataURL("image/jpeg",0.82));};
  return React.createElement("div",{className:"crop-overlay"},
    React.createElement("div",{className:"crop-title"},"CROP PHOTO"),
    React.createElement("div",{className:"crop-canvas-wrap",style:{width:SIZE,height:SIZE},onMouseDown:onDown,onMouseMove:onMove,onMouseUp:onUp,onMouseLeave:onUp,onTouchStart:onDown,onTouchMove:onTouchMove,onTouchEnd:onTouchEnd,onWheel:onWheel},

    React.createElement("div",{className:"crop-hint"},"Drag to reposition \u00B7 Scroll or pinch to zoom"),
    React.createElement("div",{className:"crop-actions"},React.createElement("button",{className:"crop-cancel",onClick:onCancel},"CANCEL"),React.createElement("button",{className:"crop-save",onClick:handleSave},"SAVE PHOTO"))

// ── Wellness View ─────────────────────────────────────────────────────────────
function WellnessView({session,showToast}){
  const [wellBks,setWellBks]=useState([]);
  const [weekStart,setWeekStart]=useState(getWeekStart);
  const [selDay,setSelDay]=useState(getInitDay);
  const [busy,setBusy]=useState({});

  useEffect(()=>{loadWellBks();},[]);

  async function loadWellBks(){
    const keys=[];const now=new Date();now.setHours(0,0,0,0);
    for(let i=0;i<28;i++){const d=addDays(now,i);if(d.getDay()!==0)keys.push(toDS(d));}
    if(!keys.length)return;
    const data=await sbGet("wellness_bookings",`date_key=in.(${keys.join(",")})&select=email,name,date_key,time`);
    setWellBks(data||[]);
  }

  const selDate=addDays(weekStart,selDay);
  const selDK=toDS(selDate);
  const weekDates=Array.from({length:6},(_,i)=>addDays(weekStart,i));
  const isThisWeek=toDS(weekStart)===toDS(mondayOf(new Date()));
  const dayBks=wellBks.filter(b=>b.date_key===selDK);
  const weekDots=weekDates.map(d=>session&&wellBks.some(b=>b.date_key===toDS(d)&&b.email===session.email));

  function isPastSlot(time){
    if(isPastD(selDate))return true;if(!isToday(selDate))return false;
    const now=new Date();const[h,m]=time.split(":").map(Number);
    return(h*60+m+45)<(now.getHours()*60+now.getMinutes());
  }

  async function handleBook(time){
    if(!session)return;
    const lk=`${selDK}-${time}`;setBusy(p=>({...p,[lk]:true}));
    const existing=dayBks.find(b=>b.time===time);
    if(existing){showToast("Slot already booked");setBusy(p=>({...p,[lk]:false}));return;}
    const newBk={email:session.email,name:session.name,date_key:selDK,time};
    setWellBks(prev=>[...prev,newBk]);
    const ok=await sbPost("wellness_bookings",newBk);
    if(!ok){setWellBks(prev=>prev.filter(b=>!(b.date_key===selDK&&b.time===time)));showToast("Booking failed \u2014 try again");}
    else{showToast("Wellness session booked \u2713");notifyWellnessBooking(session.name,session.email,selDK,time);}
    setBusy(p=>({...p,[lk]:false}));
  }

  async function handleCancel(time){
    if(!session)return;
    setWellBks(prev=>prev.filter(b=>!(b.date_key===selDK&&b.time===time&&b.email===session.email)));
    await sbDelete("wellness_bookings",`email=eq.${encodeURIComponent(session.email)}&date_key=eq.${selDK}&time=eq.${encodeURIComponent(time)}`);
    showToast("Booking cancelled");
  }

  return React.createElement("div",{className:"well-wrap"},
    React.createElement("div",{className:"well-hdr"},
      React.createElement("div",{className:"well-title"},"WELLNESS"),
      React.createElement("div",{className:"well-sub"},"SAUNA \u00B7 COLD PLUNGE"),
      React.createElement("div",{className:"week-nav",style:{padding:"0 0 10px"}},
        React.createElement("button",{className:"wk-arrow",onClick:()=>setWeekStart(w=>addDays(w,-7)),disabled:isThisWeek},"\u2039"),
        React.createElement("div",{className:"wk-label"},`${MONTHS[weekDates[0].getMonth()]} ${weekDates[0].getDate()} \u2013 ${MONTHS[weekDates[5].getMonth()]} ${weekDates[5].getDate()}  ${weekDates[0].getFullYear()}`),
        React.createElement("button",{className:"wk-arrow",onClick:()=>setWeekStart(w=>addDays(w,7))},"\u203a")
      ),
      React.createElement("div",{className:"day-strip",style:{padding:"0 0 12px"}},
        weekDates.map((d,i)=>React.createElement("button",{key:i,onClick:()=>setSelDay(i),className:`day-btn${i===selDay?" da":""}${isToday(d)?" dt":""}${weekDots[i]?" dhb":""}`},
          React.createElement("div",{className:"d-name"},DAY_SHORT[i]),
          React.createElement("div",{className:"d-num"},d.getDate()),
          React.createElement("div",{className:"d-dot"})
        ))
      ),
      React.createElement("div",{className:"day-hdr",style:{padding:"0"}},
        React.createElement("span",null,DAY_LONG[selDay].toUpperCase()),
        React.createElement("em",null,` \u00B7 ${WELL_TIMES.length} SLOTS`)
      )
    ),
    React.createElement("div",{className:"well-slots"},
      WELL_TIMES.map(time=>{
        const bk=dayBks.find(b=>b.time===time);
        const ismine=bk&&bk.email===session?.email;
        const taken=!!bk&&!ismine;
        const past=isPastSlot(time);
        const lk=`${selDK}-${time}`;const isBusy=!!busy[lk];
        return React.createElement("div",{key:time,className:`well-slot${ismine?" ws-mine":""}${past?" ws-past":""}`},
          React.createElement("div",{className:"well-slot-time"},fmt12(time)),
          React.createElement("div",{className:"well-slot-mid"},
            React.createElement("div",{className:"well-slot-name"},"SAUNA + COLD PLUNGE"),
            React.createElement("div",{className:`well-slot-status${ismine?" wss-mine":taken?" wss-taken":""}`},ismine?"Your booking \u2713":taken?"Booked":"Available")
          ),
          !past&&(ismine
            ?React.createElement("button",{className:"well-btn wb-cancel",onClick:()=>handleCancel(time)},"Cancel")
            :taken?React.createElement("button",{className:"well-btn wb-taken",disabled:true},"Booked")
            :React.createElement("button",{className:"well-btn wb-book",onClick:()=>handleBook(time),disabled:isBusy},isBusy?"...":"Book")
          )
        );
      })
    )
  );
}

// ── Notice Board ───────────────────────────────────────────────────────────
function CommunityView({session,isAdmin,showToast,memberPhotos,allMemberNames}){
  const [posts,setPosts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [text,setText]=useState("");
  const [posting,setPosting]=useState(false);
  const [replyingTo,setReplyingTo]=useState(null);
  const [replyText,setReplyText]=useState("");
  const [tagQuery,setTagQuery]=useState("");
  const [showTags,setShowTags]=useState(false);
  const MAX_CHARS=300;

  useEffect(()=>{loadPosts();const id=setInterval(loadPosts,30000);return()=>clearInterval(id);},[]);

  async function loadPosts(){
    const data=await sbGet("posts","select=id,author_email,author_name,content,created_at,likes,pinned,reply_to,reply_to_name&order=pinned.desc,created_at.desc&limit=80");
    setPosts(data||[]);setLoading(false);
  }

  function handleTextChange(e,setter){
    const val=e.target.value;
    setter(val);
    // Check for @ tag
    const atIdx=val.lastIndexOf("@");
    if(atIdx>=0&&atIdx===val.length-1){setTagQuery("");setShowTags(true);}
    else if(atIdx>=0&&val.slice(atIdx+1).match(/^\w+$/)){setTagQuery(val.slice(atIdx+1).toLowerCase());setShowTags(true);}
    else{setShowTags(false);}
  }

  function insertTag(name,setter,currentText){
    const atIdx=currentText.lastIndexOf("@");
    const newText=currentText.slice(0,atIdx)+"@"+name.replace(/ /g,"")+" ";
    setter(newText);setShowTags(false);
  }

  const filteredMembers=allMemberNames.filter(n=>n.toLowerCase().replace(/ /g,"").includes(tagQuery)).slice(0,5);

  function renderContent(content){
    if(!content) return "";
    return content.replace(/@(\S+)/g,'<span class="tag-highlight">@$1</span>');
  }

  async function handlePost(){
    const content=text.trim();if(!content||content.length>MAX_CHARS)return;
    setPosting(true);
    const post={author_email:session.email,author_name:session.name,content,created_at:Date.now(),likes:[],pinned:false};
    const ok=await sbPost("posts",post);
    if(ok){setText("");await loadPosts();}
    else showToast("Failed to post");
    setPosting(false);
  }

  async function handleReply(parentPost){
    const content=replyText.trim();if(!content)return;
    const reply={
      author_email:session.email,author_name:session.name,
      content,created_at:Date.now(),likes:[],pinned:false,
      reply_to:parentPost.id,reply_to_name:parentPost.author_name
    };
    const ok=await sbPost("posts",reply);
    if(ok){setReplyingTo(null);setReplyText("");await loadPosts();}
    else showToast("Failed to post reply");
  }

  async function handleLike(post,idx){
    const likes=Array.isArray(post.likes)?post.likes:[];
    const alreadyLiked=likes.includes(session.email);
    const newLikes=alreadyLiked?likes.filter(e=>e!==session.email):[...likes,session.email];
    const updated=[...posts];updated[idx]={...post,likes:newLikes};setPosts(updated);
    await sbPatch("posts",`id=eq.${post.id}`,{likes:newLikes});
  }

  async function handlePin(post,idx){
    const newPinned=!post.pinned;
    const updated=[...posts];updated[idx]={...post,pinned:newPinned};
    setPosts([...updated].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.created_at-a.created_at)));
    await sbPatch("posts",`id=eq.${post.id}`,{pinned:newPinned});
  }

  async function handleDelete(id){
    const snapshot=posts.find(p=>p.id===id);
    setPosts(prev=>prev.filter(p=>p.id!==id));
    const ok=await sbDelete("posts",`id=eq.${id}`);
    if(ok){showToast("Post removed");}
    else{
      if(snapshot)setPosts(prev=>[...prev,snapshot].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.created_at-a.created_at)));
      showToast("Delete failed — check Supabase permissions");
    }
  }

  const charsLeft=MAX_CHARS-text.length;
  const topLevelPosts=posts.filter(p=>!p.reply_to);

  return React.createElement("div",{className:"comm-wrap"},
    React.createElement("div",{className:"comm-hdr"},
      React.createElement("div",{className:"comm-title"},"NOTICE BOARD"),
      React.createElement("div",{className:"comm-compose compose-wrap"},
        showTags&&filteredMembers.length>0&&React.createElement("div",{className:"tag-dropdown"},
          filteredMembers.map((n,i)=>React.createElement("div",{key:i,className:"tag-option",onClick:()=>insertTag(n,setText,text)},n))
        ),
        React.createElement("textarea",{className:"comm-textarea",placeholder:"Share something with the team...",value:text,maxLength:MAX_CHARS,onChange:e=>handleTextChange(e,setText)}),
        React.createElement("div",{className:"comm-compose-footer"},
          React.createElement("div",{className:`comm-char${charsLeft<50?" warn":""}`},`${charsLeft}`),
          React.createElement("button",{className:"comm-post-btn",onClick:handlePost,disabled:posting||!text.trim()},posting?"...":"POST")
        )
      )
    ),
    React.createElement("div",{className:"comm-feed"},
      loading?React.createElement("div",{className:"comm-loading"},"LOADING...")
      :topLevelPosts.length===0?React.createElement("div",{className:"comm-empty"},"No posts yet.\nBe the first to post!")
      :topLevelPosts.map((post,i)=>{
        const isAdminPost=post.author_email===ADMIN_EMAIL;
        const canDelete=isAdmin||(post.author_email===session.email);
        const likes=Array.isArray(post.likes)?post.likes:[];
        const liked=likes.includes(session.email);
        const photo=memberPhotos[post.author_email]||"";
        const replies=posts.filter(p=>p.reply_to===post.id).sort((a,b)=>a.created_at-b.created_at);
        const isReplying=replyingTo===post.id;
        return React.createElement("div",{key:post.id||i,className:`post-card${post.pinned?" pinned-post":""}${isAdminPost?" admin-post":""}`},
          post.pinned&&React.createElement("div",{className:"post-pin-label"},"\uD83D\uDCCC PINNED"),

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [ready,setReady]=useState(false);
  const [session,setSession]=useState(null);
  const [bookings,setBookings]=useState([]);
  const [memberPhotos,setMemberPhotos]=useState({});
  const [weekStart,setWeekStart]=useState(getWeekStart);
  const [selDay,setSelDay]=useState(getInitDay);
  const [tab,setTab]=useState("book");
  const [authMode,setAuthMode]=useState("login");
  const [authForm,setAuthForm]=useState({name:"",email:"",phone:"",password:""});
  const [authErr,setAuthErr]=useState("");
  const [authBusy,setAuthBusy]=useState(false);
  const [bkBusy,setBkBusy]=useState({});
  const [toast,setToast]=useState({msg:"",show:false});
  const [showProf,setShowProf]=useState(false);
  const [memberData,setMemberData]=useState(null);
  const [profForm,setProfForm]=useState({name:"",email:"",phone:"",photo:"",newPw:"",confirmPw:""});
  const [profErr,setProfErr]=useState("");
  const [profOk,setProfOk]=useState("");
  const [profBusy,setProfBusy]=useState(false);
  const [cropSrc,setCropSrc]=useState(null);
  const [myWellness,setMyWellness]=useState([]);
  const [unreadPosts,setUnreadPosts]=useState(0);
  const [allMemberNames,setAllMemberNames]=useState([]);
  const photoRef=useRef(null);
  const isAdmin=session?.email===ADMIN_EMAIL||memberData?.is_admin===true;

  useEffect(()=>{
    (async()=>{
      const s=lsGet("t365-session",null);
      if(s){
        setSession(s);
        const mb=await sbGet("members",`email=eq.${encodeURIComponent(s.email)}`);
        if(mb.length)setMemberData(mb[0]);
      }
      await refreshBookings();
      // Check for unread posts
      const lastRead = lsGet("t365-last-read", 0);
      const recentPosts = await sbGet("posts",`created_at=gt.${lastRead}&select=id`);
      setUnreadPosts((recentPosts||[]).length);
      const allMembers=await sbGet("members","select=email,photo,name");
      const photoMap={};const nameList=[];
      (allMembers||[]).forEach(m=>{if(m.photo)photoMap[m.email]=m.photo;if(m.name)nameList.push(m.name);});
      setMemberPhotos(photoMap);setAllMemberNames(nameList);
      setReady(true);
    })();
  },[]);

  useEffect(()=>{const id=setInterval(refreshBookings,30000);return()=>clearInterval(id);},[]);

  useEffect(()=>{
    if(!session)return;
    const keys=[];const now=new Date();now.setHours(0,0,0,0);
    for(let i=0;i<28;i++){const d=addDays(now,i);if(d.getDay()!==0)keys.push(toDS(d));}
    sbGet("wellness_bookings",`email=eq.${encodeURIComponent(session.email)}&date_key=in.(${keys.join(",")})&select=email,name,date_key,time`).then(data=>setMyWellness(data||[]));
  },[session]);

  async function refreshBookings(){
    const keys=[];const now=new Date();now.setHours(0,0,0,0);
    // Load past 90 days + next 28 days for attended count
    for(let i=-90;i<28;i++){const d=addDays(now,i);if(d.getDay()!==0)keys.push(toDS(d));}
    if(!keys.length)return;
    const data=await sbGet("bookings",`date_key=in.(${keys.join(",")})&select=email,name,date_key,time`);
    setBookings(data||[]);
  }

  const selDate=addDays(weekStart,selDay);
  const selDK=toDS(selDate);
  const times=selDate.getDay()===6?SAT_TIMES:WD_TIMES;
  const weekDates=Array.from({length:6},(_,i)=>addDays(weekStart,i));
  const isThisWeek=toDS(weekStart)===toDS(mondayOf(new Date()));
  const getBksFor=(dk,t)=>bookings.filter(b=>b.date_key===dk&&b.time===t);
  const userBooked=(dk,t)=>session&&getBksFor(dk,t).some(b=>b.email===session.email);
  const weekDots=weekDates.map(d=>session&&bookings.some(b=>b.date_key===toDS(d)&&b.email===session.email));
  const myUpcoming=session?bookings.filter(b=>b.email===session.email&&b.date_key>=toDS(new Date())).sort((a,b)=>a.date_key.localeCompare(b.date_key)||a.time.localeCompare(b.time)):[];

  function showToast(msg){setToast({msg,show:true});setTimeout(()=>setToast(t=>({...t,show:false})),2200);}

  async function handleAuth(){
    const{name,email,phone,password}=authForm;const em=email.toLowerCase().trim();
    if(!em||!password){setAuthErr("Email and password are required.");return;}
    if(authMode==="signup"&&!name.trim()){setAuthErr("Please enter your name.");return;}
    if(password.length<6){setAuthErr("Password must be at least 6 characters.");return;}
    setAuthBusy(true);
    if(authMode==="login"){
      const rows=await sbGet("members",`email=eq.${encodeURIComponent(em)}`);
      if(!rows.length){setAuthErr("No account found with that email.");setAuthBusy(false);return;}
      const mb=rows[0];
      if(mb.password!==hashPw(password)){setAuthErr("Incorrect password.");setAuthBusy(false);return;}
      const s={email:em,name:mb.name};lsSet("t365-session",s);setSession(s);setMemberData(mb);
      if(mb.photo)setMemberPhotos(p=>({...p,[em]:mb.photo}));
    }else{
      const existing=await sbGet("members",`email=eq.${encodeURIComponent(em)}`);
      if(existing.length){setAuthErr("An account already exists with this email.");setAuthBusy(false);return;}
      const mb={email:em,name:name.trim(),phone:phone.trim(),photo:"",password:hashPw(password),joined_at:Date.now()};
      const ok=await sbPost("members",mb);
      if(!ok){setAuthErr("Something went wrong. Please try again.");setAuthBusy(false);return;}
      const s={email:em,name:name.trim()};lsSet("t365-session",s);setSession(s);setMemberData(mb);
    }
    setAuthBusy(false);
  }

  function handleLogout(){lsSet("t365-session",null);setSession(null);setMemberData(null);setShowProf(false);}

  async function handleBook(time){
    if(!session)return;
    const lk=`${selDK}-${time}`;setBkBusy(p=>({...p,[lk]:true}));
    const list=getBksFor(selDK,time);
    if(list.length>=MAX_SPOTS){showToast("Class is full");setBkBusy(p=>({...p,[lk]:false}));return;}
    if(list.some(b=>b.email===session.email)){showToast("Already booked");setBkBusy(p=>({...p,[lk]:false}));return;}
    const newBk={email:session.email,name:session.name,date_key:selDK,time};
    setBookings(prev=>[...prev,newBk]);
    const ok=await sbPost("bookings",newBk);
    if(!ok){setBookings(prev=>prev.filter(b=>!(b.email===session.email&&b.date_key===selDK&&b.time===time)));showToast("Booking failed \u2014 try again");}
    else showToast("Spot reserved \u2713");
    setBkBusy(p=>({...p,[lk]:false}));
  }

  async function handleCancel(time,dk){
    if(!session)return;
    setBookings(prev=>prev.filter(b=>!(b.email===session.email&&b.date_key===dk&&b.time===time)));
    await sbDelete("bookings",`email=eq.${encodeURIComponent(session.email)}&date_key=eq.${dk}&time=eq.${encodeURIComponent(time)}`);
    showToast("Booking cancelled");
  }

  function isPastClass(time){
    if(isPastD(selDate))return true;if(!isToday(selDate))return false;
    const now=new Date();const[h,m]=time.split(":").map(Number);
    return(h*60+m+45)<(now.getHours()*60+now.getMinutes());
  }

  function openProf(){
    setProfForm({name:session.name,email:session.email,phone:memberData?.phone||"",photo:memberData?.photo||"",newPw:"",confirmPw:"",emergencyName:memberData?.emergency_name||"",emergencyPhone:memberData?.emergency_phone||""});
    setProfErr("");setProfOk("");setShowProf(true);
    window.history.pushState({overlay:"profile"},"");
  }

  // Handle back button for all overlays
  useEffect(()=>{
    const handlePop=()=>{
      if(showProf){setShowProf(false);return;}
    };
    window.addEventListener("popstate",handlePop);
    return()=>window.removeEventListener("popstate",handlePop);
  },[showProf]);

  function handlePhotoChange(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>setCropSrc(ev.target.result);reader.readAsDataURL(file);e.target.value="";}
  function handleCropSave(dataUrl){setProfForm(f=>({...f,photo:dataUrl}));setCropSrc(null);}

  async function handleSaveProf(){
    const{name,email,phone,photo,newPw,confirmPw}=profForm;const em=email.toLowerCase().trim();
    if(!name.trim()){setProfErr("Name cannot be empty.");return;}
    if(!em||!/\S+@\S+\.\S+/.test(em)){setProfErr("Please enter a valid email.");return;}
    if(newPw&&newPw.length<6){setProfErr("Password must be at least 6 characters.");return;}
    if(newPw&&newPw!==confirmPw){setProfErr("Passwords do not match.");return;}
    setProfBusy(true);
    const upd={name:name.trim(),phone:phone.trim(),photo:photo||"",emergency_name:profForm.emergencyName||"",emergency_phone:profForm.emergencyPhone||""};
    if(newPw)upd.password=hashPw(newPw);if(em!==session.email)upd.email=em;
    const ok=await sbPatch("members",`email=eq.${encodeURIComponent(session.email)}`,upd);
    if(!ok){setProfErr("Update failed. Please try again.");setProfBusy(false);return;}
    const ns={email:em,name:name.trim()};
    lsSet("t365-session",ns);setSession(ns);setMemberData(d=>({...d,...upd,email:em}));
    if(photo)setMemberPhotos(p=>({...p,[em]:photo}));
    setProfOk("Profile updated.");setProfErr("");setProfBusy(false);
  }

  const memberPhoto=memberData?.photo||"";
